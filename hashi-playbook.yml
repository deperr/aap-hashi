---

- name: "Automated Certificate Lifecycle"
  hosts: "{{ _hosts | default('web02.dperrone.dev') }}"
  become: true
  gather_facts: true
  vars:
    cert_dir: "/etc/pki/tls/certs"
    key_dir: "/etc/pki/tls/private"
    domain_name: "{{ inventory_hostname }}"

  tasks:
    - name: Ensure secure system directories exist on the target host
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0700'
      loop:
        - "{{ cert_dir }}"
        - "{{ key_dir }}"

    - name: Issue certificate and key from HashiCorp Vault PKI engine
      register: vault_cert
      delegate_to: localhost
      become: false
      hashicorp.vault.pki_certificate:
        state: issued
        engine_mount_point: pki
        role_name: "{{ vault_pki_role }}"
        common_name: "{{ domain_name }}"
        alt_names:
          - "DNS:{{ domain_name }}"
          - "DNS:localhost"
        url: "{{ vault_url }}"
        auth_method: token
        token: "{{ vault_token }}"

    - name: Write the private key to target host
      ansible.builtin.copy:
        content: "{{ vault_cert.data.private_key }}"
        dest: "{{ key_dir }}/{{ domain_name }}.key"
        owner: root
        group: root
        mode: '0600'

    - name: Write the signed public certificate to target host
      ansible.builtin.copy:
        content: "{{ vault_cert.data.certificate }}"
        dest: "{{ cert_dir }}/{{ domain_name }}.crt"
        owner: root
        group: root
        mode: '0644'

    - name: Write the issuing CA certificate chain to target host
      ansible.builtin.copy:
        content: "{{ vault_cert.data.issuing_ca }}"
        dest: "{{ cert_dir }}/ca_chain.crt"
        owner: root
        group: root
        mode: '0644'
