---

- name: "Certificate Lifecycle - Phase 2: Deploy Signed Certificate"
  hosts: "{{ _hosts | default('web02.dperrone.dev') }}"
  become: true
  gather_facts: false
  vars:
    cert_dir: "/etc/pki/tls/certs"
    key_dir: "/etc/pki/tls/private"
    staging_dir: "/opt/certs/staging"
    domain_name: "{{ inventory_hostname }}"
    restart_services:
      - sshd
      - stunnel
      - named

  tasks:
    - name: Validate signed certificate exists in staging
      register: staged_cert_stat
      delegate_to: localhost
      become: false
      ansible.builtin.stat:
        path: "{{ staging_dir }}/{{ domain_name }}.crt"

    - name: Fail if signed certificate has not been staged
      when: not staged_cert_stat.stat.exists
      ansible.builtin.fail:
        msg: "Signed certificate not found at {{ staging_dir }}/{{ domain_name }}.crt — ensure offline CA signing is complete before approving."

    - name: Validate CA chain exists in staging
      register: staged_ca_stat
      delegate_to: localhost
      become: false
      ansible.builtin.stat:
        path: "{{ staging_dir }}/ca_chain.crt"

    - name: Fail if CA chain has not been staged
      when: not staged_ca_stat.stat.exists
      ansible.builtin.fail:
        msg: "CA chain not found at {{ staging_dir }}/ca_chain.crt — ensure the CA chain is deposited before approving."

    - name: Deploy signed certificate to target host
      ansible.builtin.copy:
        src: "{{ staging_dir }}/{{ domain_name }}.crt"
        dest: "{{ cert_dir }}/{{ domain_name }}.crt"
        owner: root
        group: root
        mode: '0644'

    - name: Deploy CA chain to target host
      ansible.builtin.copy:
        src: "{{ staging_dir }}/ca_chain.crt"
        dest: "{{ cert_dir }}/ca_chain.crt"
        owner: root
        group: root
        mode: '0644'

    - name: Verify certificate chain of trust
      register: cert_verify
      changed_when: false
      ansible.builtin.command:
        cmd: >-
          openssl verify
          -CAfile {{ cert_dir }}/ca_chain.crt
          {{ cert_dir }}/{{ domain_name }}.crt

    - name: Fail if certificate chain verification failed
      when: "'OK' not in cert_verify.stdout"
      ansible.builtin.fail:
        msg: "Certificate chain verification FAILED: {{ cert_verify.stdout }}"

    - name: Configure and restart core services
      register: service_results
      loop: "{{ restart_services }}"
      ignore_errors: true
      ansible.builtin.service:
        name: "{{ item }}"
        state: restarted
        enabled: true

    - name: Clean up staging directory
      delegate_to: localhost
      become: false
      loop:
        - "{{ staging_dir }}/{{ domain_name }}.csr"
        - "{{ staging_dir }}/{{ domain_name }}.crt"
        - "{{ staging_dir }}/ca_chain.crt"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent

    - name: Certificate deployment complete - universal trust established
      ansible.builtin.debug:
        msg:
          - "Certificate deployed for {{ domain_name }}"
          - "Chain verification: {{ cert_verify.stdout }}"
          - ""
          - "Files deployed:"
          - "  Certificate: {{ cert_dir }}/{{ domain_name }}.crt"
          - "  Private key: {{ key_dir }}/{{ domain_name }}.key"
          - "  CA chain: {{ cert_dir }}/ca_chain.crt"
          - ""
          - "Service status:"
          - "{% for result in service_results.results %}  {{ result.item }}: {{ 'OK' if result is succeeded else 'FAILED' }}\n{% endfor %}"
