---

# Vault container settings
vault_image: "docker.io/hashicorp/vault"
vault_version: "latest"
vault_container_name: "vault-server"

# Directory layout on the host
vault_base_dir: "~/vault"
vault_config_dir: "{{ vault_base_dir }}/config"
vault_data_dir: "{{ vault_base_dir }}/data"

# Internal Vault container UID/GID (Vault runs as UID 100 inside the container)
vault_internal_uid: 100
vault_internal_gid: 1000

# Network settings
vault_port: 8200
vault_addr: "http://127.0.0.1:{{ vault_port }}"

# TLS settings
vault_tls_disable: true

# Vault configuration
vault_disable_mlock: false
vault_ui_enabled: true
vault_storage_path: "/vault/file"
vault_log_level: "info"

# Container management
vault_container_recreate: false

# Initialization and unseal settings
vault_init: true
vault_key_shares: 5
vault_key_threshold: 3

# Secrets engines configuration
vault_configure_engines: true

# KV secrets engine
vault_kv_path: "secret"

# PKI secrets engine
vault_pki_path: "pki"
vault_pki_max_ttl: "87600h"
vault_pki_cert_ttl: "720h"
vault_pki_root_cn: "Vault Root CA"
vault_pki_role_name: "homelab-servers"
vault_pki_allowed_domains:
  - "dperrone.dev"
